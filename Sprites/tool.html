<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Teste Sprite Sheet</title>
    <style>
      body {
        font-family: monospace;
      }
      .frame {
        display: inline-block;
        border: 1px solid #333;
        margin: 2px;
      }
    </style>
  </head>
  <body>
    <h1>Teste Sprite Sheet Frames</h1>
    <div id="container"></div>

    <script>
      const imgSrc = "player_spritesheet.png"; // Coloque o nome da sua imagem aqui
      const rows = 1;
      const cols = 8;
      const sheetWidth = 512;
      const sheetHeight = 64;
      const frameWidth = sheetWidth / cols;
      const frameHeight = sheetHeight / rows;

      const container = document.getElementById("container");
      const img = new Image();
      img.src = imgSrc;

      img.onload = () => {
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const canvas = document.createElement("canvas");
            canvas.width = frameWidth;
            canvas.height = frameHeight;
            canvas.className = "frame";
            const ctx = canvas.getContext("2d");

            // Desenha o frame correto da sprite sheet no canvas
            ctx.drawImage(
              img,
              col * frameWidth,
              row * frameHeight, // Origem no sprite sheet
              frameWidth,
              frameHeight, // Tamanho do frame
              0,
              0, // Posição no canvas
              frameWidth,
              frameHeight // Tamanho no canvas
            );

            container.appendChild(canvas);
          }
          // Quebra linha
          const br = document.createElement("br");
          container.appendChild(br);
        }
      };
    </script>
  </body>
</html>
